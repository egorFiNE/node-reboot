name: Prebuild for release

on:
  workflow_dispatch:

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-15
            label: darwin-arm64
          - os: macos-15-intel
            label: darwin-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npx prebuildify --napi --strip
      - name: Archive prebuilds
        shell: bash
        run: |
          find prebuilds -type f -print
          mkdir -p artifact
          tar -czf "artifact/prebuilds-${{ matrix.label }}.tgz" prebuilds

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: prebuilds-${{ matrix.label }}
          path: artifact/*.tgz
          if-no-files-found: error

  pack:
    needs: prebuild
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Merge prebuilds
        shell: bash
        run: |
          rm -rf prebuilds dist
          mkdir -p prebuilds dist
          find artifacts -maxdepth 3 -type f -print
          archives="$(find artifacts -type f -name '*.tgz' -print)"
          if [ -z "$archives" ]; then
            echo "No prebuild archives found in downloaded artifacts" >&2
            exit 1
          fi
          while IFS= read -r archive; do
            tar -xzf "$archive"
          done <<< "$archives"
          find prebuilds -type f -print

      - name: Pack module
        run: npm pack --pack-destination dist

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: reboot-tgz
          path: dist/*.tgz
          if-no-files-found: error
